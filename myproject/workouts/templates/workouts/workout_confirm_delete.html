{% extends 'base.html' %}

{% block content %}
  <h2>Delete workout</h2>
  <p class="help">Are you sure you want to delete "{{ object.name }}" ({{ object.date }})? This will also delete its exercises.</p>

  <form class="form" method="post">
    {% csrf_token %}
    <div class="actions">
      <button class="btn btn-danger" type="submit">Yes, delete</button>
      <a class="btn" href="{% url 'workout_detail' object.pk %}">Cancel</a>
    </div>
  </form>
{% endblock %}
